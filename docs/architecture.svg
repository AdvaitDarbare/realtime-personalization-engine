<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Real-Time Shoe Personalization Architecture</title>
  <desc id="desc">A rendered architecture diagram showing events flowing into Kafka, Flink building live profiles, MCP exposing context, and CrewAI plus OpenAI producing recommendations.</desc>
  <defs>
    <style>
      .page { fill: #fbfbfb; }
      .title { font: 700 34px "Comic Sans MS", "Bradley Hand", "Segoe UI", sans-serif; fill: #0b6bff; }
      .section { font: 700 18px "Comic Sans MS", "Bradley Hand", "Segoe UI", sans-serif; fill: #222; }
      .body { font: 16px "Comic Sans MS", "Bradley Hand", "Segoe UI", sans-serif; fill: #27272a; }
      .small { font: 13px "Comic Sans MS", "Bradley Hand", "Segoe UI", sans-serif; fill: #27272a; }
      .tiny { font: 11px "Comic Sans MS", "Bradley Hand", "Segoe UI", sans-serif; fill: #27272a; }
      .box { stroke: #1f2937; stroke-width: 2; rx: 10; ry: 10; }
      .producer { fill: #e6fcf5; stroke: #087f5b; }
      .kafka { fill: #d3f9d8; stroke: #2b8a3e; }
      .flink { fill: #fff4e6; stroke: #e67700; }
      .context { fill: #e7f5ff; stroke: #1971c2; }
      .mcp { fill: #f3f0ff; stroke: #6741d9; }
      .agent { fill: #f8f9fa; stroke: #343a40; }
      .output { fill: #f8f0fc; stroke: #862e9c; }
      .panel { fill: #e8f7fb; stroke: none; }
      .arrow { fill: none; stroke: #1f2937; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowhead); }
      .soft-arrow { fill: none; stroke: #4b5563; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowheadSoft); }
      .dash { stroke-dasharray: 6 6; }
      .grid-line { stroke: #1971c2; stroke-width: 1.3; }
      .profile-cell { fill: #d0ebff; stroke: #1971c2; stroke-width: 1.2; }
      .topic-line { stroke: #2b8a3e; stroke-width: 1.4; opacity: .75; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#1f2937"/>
    </marker>
    <marker id="arrowheadSoft" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#4b5563"/>
    </marker>
    <pattern id="topicHatch" width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(18)">
      <line x1="0" y1="0" x2="0" y2="9" class="topic-line"/>
    </pattern>
  </defs>

  <rect class="page" x="0" y="0" width="1200" height="900"/>

  <text class="title" x="90" y="62">Real-Time Shoe Personalization</text>
  <text class="section" x="90" y="120">The Problem</text>
  <text class="body" x="90" y="152">Recommendations based on yesterday's batch features can miss what a shopper is doing right now.</text>

  <text class="section" x="90" y="210">Why Real-Time Context Matters</text>
  <text class="body" x="90" y="242">If a user is browsing running shoes or adding budget sneakers to cart, the agent should see that live signal.</text>

  <text class="section" x="90" y="305">How the Architecture Works</text>
  <circle cx="99" cy="337" r="3" fill="#27272a"/>
  <text class="body" x="124" y="343">Clickstream, cart, inventory, and metadata events stream into Kafka.</text>
  <circle cx="99" cy="377" r="3" fill="#27272a"/>
  <text class="body" x="124" y="383">Flink turns raw events into live user and product profiles.</text>
  <circle cx="99" cy="417" r="3" fill="#27272a"/>
  <text class="body" x="124" y="423">Product metadata is indexed in ChromaDB for semantic product search.</text>
  <circle cx="99" cy="457" r="3" fill="#27272a"/>
  <text class="body" x="124" y="463">An optional MCP server exposes the context as clean tools.</text>
  <circle cx="99" cy="497" r="3" fill="#27272a"/>
  <text class="body" x="124" y="503">CrewAI plus OpenAI reads the context and writes recommendations back to Kafka.</text>

  <text class="small" x="450" y="570" text-anchor="middle">Real-Time Context Engine</text>
  <rect class="panel" x="70" y="590" width="760" height="210" rx="18" ry="18"/>

  <rect class="box producer" x="105" y="625" width="142" height="34"/>
  <text class="tiny" x="176" y="647" text-anchor="middle">Clickstream events</text>
  <rect class="box producer" x="105" y="682" width="142" height="34"/>
  <text class="tiny" x="176" y="704" text-anchor="middle">Cart updates</text>
  <rect class="box producer" x="105" y="739" width="142" height="34"/>
  <text class="tiny" x="176" y="761" text-anchor="middle">Inventory changes</text>

  <path class="arrow" d="M247 642 C285 642, 295 642, 320 642"/>
  <path class="arrow" d="M247 699 C285 699, 295 686, 320 675"/>
  <path class="arrow" d="M247 756 C285 756, 295 727, 320 708"/>

  <g>
    <rect class="box kafka" x="320" y="622" width="112" height="38"/>
    <rect x="330" y="627" width="92" height="28" fill="url(#topicHatch)" opacity=".55"/>
    <text class="tiny" x="376" y="646" text-anchor="middle">Kafka topic</text>
    <rect class="box kafka" x="320" y="680" width="112" height="38"/>
    <rect x="330" y="685" width="92" height="28" fill="url(#topicHatch)" opacity=".55"/>
    <text class="tiny" x="376" y="704" text-anchor="middle">Kafka topic</text>
    <rect class="box kafka" x="320" y="738" width="112" height="38"/>
    <rect x="330" y="743" width="92" height="28" fill="url(#topicHatch)" opacity=".55"/>
    <text class="tiny" x="376" y="762" text-anchor="middle">Kafka topic</text>
  </g>

  <path class="arrow" d="M432 642 C462 642, 470 665, 495 665"/>
  <path class="arrow" d="M432 699 C462 699, 470 690, 495 690"/>
  <path class="arrow" d="M432 756 C462 756, 470 715, 495 715"/>

  <polygon class="box flink" points="540,625 592,675 540,725 488,675"/>
  <text class="small" x="540" y="681" text-anchor="middle">Flink</text>

  <path class="arrow" d="M592 665 C625 654, 640 650, 670 650"/>
  <path class="arrow" d="M592 705 C625 716, 640 720, 670 720"/>

  <rect class="box context" x="670" y="628" width="118" height="44"/>
  <text class="tiny" x="729" y="646" text-anchor="middle">active interest</text>
  <text class="tiny" x="729" y="660" text-anchor="middle">price sensitivity</text>

  <rect class="box context" x="670" y="700" width="118" height="44"/>
  <text class="tiny" x="729" y="718" text-anchor="middle">stock trend</text>
  <text class="tiny" x="729" y="732" text-anchor="middle">demand score</text>

  <path class="arrow" d="M788 650 C820 650, 835 650, 865 650"/>
  <path class="arrow" d="M788 722 C820 722, 835 722, 865 722"/>

  <g transform="translate(865 618)">
    <text class="tiny" x="42" y="-9" text-anchor="middle">live user profile</text>
    <rect class="profile-cell" x="0" y="0" width="28" height="28"/>
    <rect class="profile-cell" x="28" y="0" width="28" height="28"/>
    <rect class="profile-cell" x="56" y="0" width="28" height="28"/>
    <rect class="profile-cell" x="0" y="28" width="28" height="28"/>
    <rect class="profile-cell" x="28" y="28" width="28" height="28"/>
    <rect class="profile-cell" x="56" y="28" width="28" height="28"/>
  </g>
  <g transform="translate(865 690)">
    <text class="tiny" x="42" y="-9" text-anchor="middle">live product profile</text>
    <rect class="profile-cell" x="0" y="0" width="28" height="28"/>
    <rect class="profile-cell" x="28" y="0" width="28" height="28"/>
    <rect class="profile-cell" x="56" y="0" width="28" height="28"/>
    <rect class="profile-cell" x="0" y="28" width="28" height="28"/>
    <rect class="profile-cell" x="28" y="28" width="28" height="28"/>
    <rect class="profile-cell" x="56" y="28" width="28" height="28"/>
  </g>

  <rect class="box mcp" x="990" y="650" width="128" height="52"/>
  <text class="tiny" x="1054" y="672" text-anchor="middle">MCP context</text>
  <text class="tiny" x="1054" y="687" text-anchor="middle">tools</text>
  <path class="soft-arrow dash" d="M949 650 C972 650, 975 662, 990 670"/>
  <path class="soft-arrow dash" d="M949 722 C972 722, 975 698, 990 686"/>

  <rect class="box mcp" x="522" y="760" width="176" height="48"/>
  <text class="tiny" x="610" y="779" text-anchor="middle">product metadata</text>
  <text class="tiny" x="610" y="794" text-anchor="middle">+ ChromaDB embeddings</text>
  <path class="soft-arrow dash" d="M610 760 C610 740, 603 720, 590 704"/>

  <rect class="box agent" x="1138" y="620" width="190" height="50"/>
  <text class="small" x="1233" y="650" text-anchor="middle">Personalization Agent</text>
  <rect class="box agent" x="1138" y="700" width="190" height="50"/>
  <text class="small" x="1233" y="730" text-anchor="middle">Merchandising Agent</text>
  <path class="arrow" d="M1118 676 C1130 660, 1134 648, 1138 646"/>
  <path class="arrow" d="M1118 676 C1130 692, 1134 716, 1138 724"/>

  <rect class="box output" x="1360" y="616" width="142" height="34"/>
  <text class="tiny" x="1431" y="638" text-anchor="middle">recommendations</text>
  <rect class="box output" x="1360" y="664" width="142" height="34"/>
  <text class="tiny" x="1431" y="686" text-anchor="middle">Grafana view</text>
  <rect class="box output" x="1360" y="712" width="142" height="34"/>
  <text class="tiny" x="1431" y="734" text-anchor="middle">future UI</text>
  <path class="arrow" d="M1328 646 C1342 646, 1348 634, 1360 634"/>
  <path class="arrow" d="M1328 724 C1342 724, 1348 730, 1360 730"/>
  <path class="soft-arrow" d="M1328 646 C1345 658, 1348 676, 1360 682"/>

  <text class="section" x="90" y="845">Outcome</text>
  <text class="body" x="90" y="875">Recommendations shift with live user intent, stock, pricing, and product metadata.</text>
</svg>
